run:
  timeout: 5m

linters:
  # Поле 'default' больше не существует. 
  # Включаем нужные линтеры явно.
  enable:
    - bodyclose
    - contextcheck
    - gosec
    - rowserrcheck
    - errcheck
    - gosimple
    - govet
    - staticcheck
    - unused
    - ineffassign
    - typecheck

# Настройки линтеров теперь живут здесь
linters-settings:
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.DB).Close
      - (*database/sql.Rows).Close
      - (*github.com/gorilla/websocket.Conn).SetReadDeadline
      - (*github.com/gorilla/websocket.Conn).SetWriteDeadline
      - (*github.com/nats-io/nats.go.Subscription).Unsubscribe

  gosec:
    excludes:
      - G104

# Правила исключений (бывший exclusions) теперь живут в блоке issues
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: _test\.go
      linters:
        - gosec
      text: "G404|G101"