# /deployments/nats/nats.conf

# ==============================================================================
# NATS Cluster Configuration (Mesh Topology)
# ==============================================================================
# Конфигурация является статичной для всех узлов кластера. 
# Масштабирование осуществляется через DNS Discovery (запись nodes.up.mt).
# ==============================================================================

# Клиентский интерфейс для локальных сервисов (Go/other)
port: 4222

# Интерфейс мониторинга и метрик (рекомендуется ограничить доступ на уровне VCN)
http_port: 8222

# Идентификатор узла (подставляется из системного hostname)
server_name: $HOSTNAME

cluster {
  # Идентификатор кластера (должен совпадать на всех нодах)
  name: "platform.go"
  
  # Порт межсерверной коммуникации (Gossip & Replication)
  # Требуется ограничение Ingress Rules в Security List (разрешен только внутри VCN)
  port: 6222

  # SERVICE DISCOVERY:
  # Используется DNS-резолв для автоматического построения полной mesh-сети.
  # При запуске NATS опрашивает А-записи указанного домена и инициирует 
  # подключение ко всем найденным эндпоинтам.
  routes: ["nats-route://nodes.up.mt:6222"]

  # Рекламный адрес узла (прокидывается через переменную окружения в systemd)
  # Необходим для корректной маршрутизации между нодами в разных подсетях.
  cluster_advertise: $NODE_IP
}

jetstream {
  # Персистентное хранилище для Streams и Key-Value бакетов
  store_dir: "/var/lib/nats/jetstream"
  
  # Квоты ресурсов (оптимизировано под Standard/Free Tier инстансы)
  max_mem: 512M
  max_file: 10G
}

# Аутентификация внутреннего трафика кластера
authorization {
  user: $NATS_CLUSTER_USER
  password: $NATS_CLUSTER_PASSWORD
}