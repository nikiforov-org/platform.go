services:

  # NATS-кластер. --scale nats=N запускает N нод.
  # Docker DNS резолвит имя сервиса `nats` во все запущенные контейнеры.
  nats:
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      # Для single-node дефолт — фиксированные 4222/8222 (стабильные адреса
      # для локальных клиентов). Для multi-node start.sh экспортирует диапазоны:
      # NATS_CLIENT_PORTS="4222-4322:4222", NATS_HTTP_PORTS="8222-8322:8222".
      # OrbStack port allocator не reset'ит индекс между запусками, поэтому
      # диапазон для scale=1 даёт непредсказуемые порты (4223, 4224 и т.д.).
      - "${NATS_CLIENT_PORTS:-4222:4222}"
      - "${NATS_HTTP_PORTS:-8222:8222}"
    volumes:
      # Конфиг рендерится start.sh в /tmp/platform-dev-nats.conf в зависимости
      # от числа нод: для N=1 блок cluster{} опускается (route нa самого себя
      # блокирует старт JetStream), для N>1 — включается с routes на сервис `nats`.
      - ${DEV_NATS_CONF:-./nats.conf}:/etc/nats/nats.conf:ro
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       platform
      POSTGRES_USER:     platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform

networks:
  platform:

volumes:
  postgres_data:
