services:

  # NATS-кластер. --scale nats=N запускает N нод.
  # Docker DNS резолвит имя сервиса `nats` во все запущенные контейнеры.
  nats:
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222-4322:4222"   # первый контейнер → 4222, следующие → 4223, 4224, ...
      - "8222-8322:8222"   # мониторинг: http://localhost:8222
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       platform
      POSTGRES_USER:     platform
      POSTGRES_PASSWORD: platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - platform

networks:
  platform:

volumes:
  postgres_data:
