# deployments/envs/dev/nats.conf
#
# Fallback single-node конфиг для запуска NATS вручную (docker compose up
# без start.sh). start.sh рендерит конфиг на лету в /tmp/platform-dev-nats.conf
# с учётом числа нод и монтирует его через $DEV_NATS_CONF.
#
# Для single-node cluster{} сознательно отсутствует: `routes: ["nats-route://nats:6222"]`
# при scale=1 резолвится Docker DNS в IP этого же контейнера → NATS залипает
# в "Waiting for routing to be established" → JetStream остаётся недоступным
# (err_code=10008) → сервисы падают циклическим рестартом на init KV-бакета.

server_name: $HOSTNAME
port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_mem:   256M
  max_file:  10G
}
