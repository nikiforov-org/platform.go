# deployments/mode/dev/nats.conf
#
# NATS-конфиг для локального Docker-стенда.
# Работает для любого числа нод (1..N).
#
# Docker DNS резолвит имя сервиса `nats` во все контейнеры этого сервиса.
# Самоподключение NATS игнорирует автоматически.

port: 4222
http_port: 8222

cluster {
  name: "platform-dev"
  port: 6222
  routes: ["nats-route://nats:6222"]
}

jetstream {
  store_dir: "/data/jetstream"
  max_mem:   256M
  max_file:  10G
}
