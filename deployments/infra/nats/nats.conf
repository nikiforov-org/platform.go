# deployments/services/nats/nats.conf
#
# Конфигурация NATS-кластера для production.
# Один файл для всех нод — масштабирование через DNS Discovery.
#
# Переменные окружения (раскрываются systemd-юнитом):
#   HOSTNAME             — имя текущей ноды (обычно $HOSTNAME системы)
#   NODE_IP              — IP-адрес текущей ноды (для cluster_advertise)
#   NATS_CLUSTER_USER    — логин для authorization{}
#   NATS_CLUSTER_PASSWORD — пароль для authorization{}

# Клиентский интерфейс для локальных сервисов
port: 4222

# Мониторинг и метрики (ограничьте доступ на уровне firewall/VCN)
http_port: 8222

# Имя ноды из hostname
server_name: $HOSTNAME

cluster {
  name: "platform.go"
  port: 6222

  # DNS Discovery: NATS опрашивает A-записи домена и строит полную mesh-сеть.
  # Добавление новой ноды = добавление A-записи в DNS, без правки конфига.
  routes: ["nats-route://nodes.up.mt:6222"]

  # Рекламный адрес ноды — необходим для маршрутизации между подсетями.
  cluster_advertise: $NODE_IP
}

jetstream {
  store_dir: "/var/lib/nats/jetstream"
  max_mem:   512M
  max_file:  10G
}

authorization {
  user:     $NATS_CLUSTER_USER
  password: $NATS_CLUSTER_PASSWORD
}
