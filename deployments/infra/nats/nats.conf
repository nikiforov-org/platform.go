# deployments/infra/nats/nats.conf
#
# Конфигурация NATS-кластера для production.
# Один файл для всех нод — масштабирование через DNS Discovery.
#
# Переменные окружения (задаются в /etc/nats/env, раскрываются NATS при старте):
#   HOSTNAME              — имя текущей ноды
#   NODE_IP               — IP-адрес текущей ноды (для cluster_advertise)
#   PLATFORM_DOMAIN       — домен A-записей кластера (все ноды)
#   NATS_CLUSTER_USER     — логин клиентского доступа
#   NATS_CLUSTER_PASSWORD — пароль клиентского доступа

# Клиентский интерфейс для локальных сервисов
port: 4222

# Мониторинг — loopback-only (внешний доступ через SSH-tunnel).
# Defense-in-depth: bind на 127.0.0.1 — первичный слой; UFW — вторичный.
# Иначе при `ufw disable` для отладки или провайдере с собственным firewall
# впереди VPS — public leak `/varz` (server config), `/connz` (клиенты с IP),
# `/jsz` (JetStream stream details), `/healthz`.
http: "127.0.0.1:8222"

# Имя ноды из hostname
server_name: $HOSTNAME

jetstream {
  store_dir: "/var/lib/nats/jetstream"
  max_mem:   512M
  max_file:  10G
}

authorization {
  user:     $NATS_CLUSTER_USER
  password: $NATS_CLUSTER_PASSWORD
}
