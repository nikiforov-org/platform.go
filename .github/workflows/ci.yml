# .github/workflows/ci.yml
#
# CI: сборка + проверка + тесты на каждый push/PR.
# Release: сборка релизных бинарников и создание pre-release при push в main.
#
# Деплой каждого сервиса — в отдельных *-deploy.yml файлах.
# Добавить новый сервис: cmd/newservice/ + newservice.nomad + newservice-deploy.yml.
# Этот файл не трогать.
#
# Необходимые GitHub Secrets (общие, используются в *-deploy.yml):
#   DEPLOY_SSH_KEY   — приватный SSH-ключ для подключения к серверу
#   DEPLOY_USER      — SSH-пользователь (например: ubuntu)
#   PLATFORM_DOMAIN  — домен A-записей кластера (например: nodes.example.com)
#   NOMAD_TOKEN      — Nomad ACL bootstrap token

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ===========================================================================
  # CI — сборка, линтинг, тесты
  # ===========================================================================
  ci:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build ./cmd/...

      - name: Vet
        run: go vet ./...

      - name: Test (unit, race detector)
        run: go test -race ./...

      - name: Test (integration)
        run: go test -race -tags=integration ./...

  # ===========================================================================
  # Lint — статанализ (staticcheck) + проверка уязвимостей (govulncheck).
  # Параллельно с ci; release ждёт оба.
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: false  # golangci-lint сам управляет кэшем

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

      - name: Govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod

  # ===========================================================================
  # Release — сборка релизных бинарников и создание pre-release.
  # Запускается только при push в main после успешного ci+lint.
  #
  # Публикует checksums как GitHub Actions artifact — deploy workflows
  # скачивают его через run-id для точной привязки к этому запуску.
  # ===========================================================================
  release:
    name: Release
    needs: [ci, lint]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set build version
        id: version
        run: |
          VERSION="build-${{ github.run_number }}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        run: |
          mkdir -p dist
          # cmd/*/ с nullglob — раскрывается только в директории; файл в cmd/
          # (README, .gitkeep) не попадает в список и не ломает go build.
          shopt -s nullglob
          for dir in cmd/*/; do
            svc="${dir%/}"; svc="${svc#cmd/}"
            for arch in amd64 arm64; do
              GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
                go build -trimpath -o dist/$svc ./cmd/$svc
              chmod +x dist/$svc
              tar -czf dist/${svc}_linux_${arch}.tar.gz -C dist $svc
              rm dist/$svc
            done
          done

      - name: Compute checksums
        run: |
          # Формат: CS_GATEWAY_AMD64=sha256:<hex>
          # Deploy workflows скачивают этот артефакт и читают как env vars.
          shopt -s nullglob
          for dir in cmd/*/; do
            svc="${dir%/}"; svc="${svc#cmd/}"
            for arch in amd64 arm64; do
              varname="CS_$(echo $svc | tr '[:lower:]' '[:upper:]')_$(echo $arch | tr '[:lower:]' '[:upper:]')"
              hash=$(sha256sum "dist/${svc}_linux_${arch}.tar.gz" | awk '{print $1}')
              echo "${varname}=sha256:${hash}"
            done
          done > dist/checksums.env

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.env
          retention-days: 7

      - name: Create pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.value }}
          prerelease: true
          files: dist/*.tar.gz
          generate_release_notes: true

      - name: Cleanup old pre-releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KEEP=5
          # Явная сортировка по createdAt: gh release list по умолчанию отдаёт
          # newest-first через REST API, но это поведение не зафиксировано в CLI.
          # При ручном rebuild старого тега (created_at свежее tag-номера) tail -n
          # удалил бы не самые старые билды.
          gh release list --repo "${{ github.repository }}" --limit 100 \
            --json tagName,isPrerelease,createdAt \
            | jq -r --argjson keep "$KEEP" '
                [.[] | select(.isPrerelease and (.tagName | startswith("build-")))]
                | sort_by(.createdAt) | reverse | .[$keep:] | .[].tagName
              ' \
            | xargs -r -I {} sh -c \
              'echo "Deleting {}..." && gh release delete {} \
               --repo "${{ github.repository }}" --yes --cleanup-tag'
