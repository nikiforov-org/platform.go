# .github/workflows/rotate-credentials.yml
#
# Ротация серверных секретов платформы.
#
# Порядок: оператор обновляет GitHub Secret → запускает этот workflow →
# workflow обновляет конфиги на всех нодах → reload/restart → редеплой сервисов.
#
# PLATFORM_NOMAD_TOKEN не ротируется — bootstrap-токен зашит в Raft-state,
# замена требует сброса /var/lib/nomad/* на всех нодах (ручная операция).
#
# Необходимые GitHub Secrets/Variables — те же, что для setup.yml и *-deploy.yml.

name: Rotate Credentials

on:
  workflow_dispatch:
    inputs:
      rotate_nats_creds:
        description: 'Ротировать NATS user/password'
        type: boolean
        default: false
      rotate_nats_tls:
        description: 'Ротировать NATS TLS (CA + node certs)'
        type: boolean
        default: false
      rotate_nomad_tls:
        description: 'Ротировать Nomad TLS (CA + node certs)'
        type: boolean
        default: false
      rotate_nomad_gossip:
        description: 'Ротировать Nomad gossip key'
        type: boolean
        default: false

jobs:
  # ===========================================================================
  # Валидация — хотя бы один чекбокс выбран
  # ===========================================================================
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Check at least one rotation selected
        run: |
          if [[ "${{ inputs.rotate_nats_creds }}" != "true" && \
                "${{ inputs.rotate_nats_tls }}" != "true" && \
                "${{ inputs.rotate_nomad_tls }}" != "true" && \
                "${{ inputs.rotate_nomad_gossip }}" != "true" ]]; then
            echo "Не выбрана ни одна группа ротации"
            exit 1
          fi
          echo "Выбранные ротации:"
          [[ "${{ inputs.rotate_nats_creds }}" == "true" ]] && echo "  • NATS user/password"
          [[ "${{ inputs.rotate_nats_tls }}" == "true" ]] && echo "  • NATS TLS"
          [[ "${{ inputs.rotate_nomad_tls }}" == "true" ]] && echo "  • Nomad TLS"
          [[ "${{ inputs.rotate_nomad_gossip }}" == "true" ]] && echo "  • Nomad gossip key"

  # ===========================================================================
  # Ротация — обновление конфигов на всех нодах
  # ===========================================================================
  rotate:
    name: Rotate on all nodes
    needs: validate
    runs-on: ubuntu-latest

    env:
      PLATFORM_DEPLOY_SSH_KEY:    ${{ secrets.PLATFORM_DEPLOY_SSH_KEY }}
      PLATFORM_DEPLOY_USER:       ${{ vars.PLATFORM_DEPLOY_USER }}
      PLATFORM_DOMAIN:            ${{ vars.PLATFORM_DOMAIN }}
      PLATFORM_HOST_FINGERPRINTS: ${{ vars.PLATFORM_HOST_FINGERPRINTS }}
      PLATFORM_NATS_USER:         ${{ vars.PLATFORM_NATS_USER }}
      PLATFORM_NATS_PASSWORD:     ${{ secrets.PLATFORM_NATS_PASSWORD }}
      PLATFORM_NATS_CA_KEY:       ${{ secrets.PLATFORM_NATS_CA_KEY }}
      PLATFORM_NATS_CA_CERT:      ${{ secrets.PLATFORM_NATS_CA_CERT }}
      PLATFORM_NOMAD_CA_KEY:      ${{ secrets.PLATFORM_NOMAD_CA_KEY }}
      PLATFORM_NOMAD_CA_CERT:     ${{ secrets.PLATFORM_NOMAD_CA_CERT }}
      PLATFORM_NOMAD_GOSSIP_KEY:  ${{ secrets.PLATFORM_NOMAD_GOSSIP_KEY }}
      PLATFORM_NOMAD_TOKEN:       ${{ secrets.PLATFORM_NOMAD_TOKEN }}

    steps:
      - name: Resolve nodes and configure SSH
        run: |
          KEY_FILE=$(mktemp)
          KNOWN_HOSTS_FILE=$(mktemp)
          echo "$PLATFORM_DEPLOY_SSH_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"

          HOSTS=$(dig +short "$PLATFORM_DOMAIN" A | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$')
          [ -n "$HOSTS" ] || { echo "DNS lookup failed for $PLATFORM_DOMAIN"; exit 1; }

          ssh-keyscan -t ed25519,ecdsa,rsa $HOSTS > "$KNOWN_HOSTS_FILE" 2>/dev/null
          [ -s "$KNOWN_HOSTS_FILE" ] || { echo "ssh-keyscan: пустой ответ"; exit 1; }

          echo "Host key fingerprints:"
          ssh-keygen -lf "$KNOWN_HOSTS_FILE"

          if [ -n "$PLATFORM_HOST_FINGERPRINTS" ]; then
            EXPECTED=$(printf '%s\n' "$PLATFORM_HOST_FINGERPRINTS" | tr ',' '\n' | tr -d '\r' | grep -v '^$')
            VERIFIED_HOSTS=""
            MITM_DETECTED=false
            for HOST in $HOSTS; do
              HOST_FPS=$(grep "^$HOST " "$KNOWN_HOSTS_FILE" | ssh-keygen -lf - 2>/dev/null | awk '{print $2}')
              if [ -z "$HOST_FPS" ]; then
                echo "WARN: $HOST не ответил на ssh-keyscan, исключаем"
                continue
              fi
              MATCH=false
              while IFS= read -r FP; do
                if echo "$EXPECTED" | grep -qFx "$FP"; then
                  MATCH=true
                  break
                fi
              done <<< "$HOST_FPS"
              if $MATCH; then
                VERIFIED_HOSTS="$VERIFIED_HOSTS $HOST"
              else
                echo "FAIL: host key $HOST не совпал с PLATFORM_HOST_FINGERPRINTS"
                MITM_DETECTED=true
              fi
            done
            if $MITM_DETECTED; then
              echo "Aborting: возможный MITM"
              exit 1
            fi
            [ -n "$VERIFIED_HOSTS" ] || { echo "FAIL: ни одна нода не прошла проверку"; exit 1; }
            HOSTS="$VERIFIED_HOSTS"
          else
            echo "WARN: PLATFORM_HOST_FINGERPRINTS не задан — TOFU режим"
          fi

          # Сохраняем для следующих шагов
          echo "$KEY_FILE" > /tmp/rotate_key_file
          echo "$KNOWN_HOSTS_FILE" > /tmp/rotate_known_hosts
          echo "$HOSTS" > /tmp/rotate_hosts

      - name: Check all nodes reachable
        run: |
          KEY_FILE=$(cat /tmp/rotate_key_file)
          KNOWN_HOSTS_FILE=$(cat /tmp/rotate_known_hosts)
          HOSTS=$(cat /tmp/rotate_hosts)

          SSH="ssh -i $KEY_FILE -o UserKnownHostsFile=$KNOWN_HOSTS_FILE -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=10"

          UNREACHABLE=""
          for HOST in $HOSTS; do
            echo "▶ Проверка $HOST..."
            if ! $SSH "${PLATFORM_DEPLOY_USER}@${HOST}" "echo ok" >/dev/null 2>&1; then
              echo "  ✗ SSH недоступен"
              UNREACHABLE="$UNREACHABLE $HOST"
            else
              echo "  ✓ Доступен"
            fi
          done

          if [ -n "$UNREACHABLE" ]; then
            echo "FAIL: недоступные ноды:$UNREACHABLE"
            echo "Ротация требует доступности всех нод. Исправьте проблему и запустите заново."
            exit 1
          fi

          echo "✓ Все ноды доступны"

      - name: Rotate NATS credentials
        if: inputs.rotate_nats_creds == true
        run: |
          KEY_FILE=$(cat /tmp/rotate_key_file)
          KNOWN_HOSTS_FILE=$(cat /tmp/rotate_known_hosts)
          HOSTS=$(cat /tmp/rotate_hosts)

          SSH="ssh -i $KEY_FILE -o UserKnownHostsFile=$KNOWN_HOSTS_FILE -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=10"

          for HOST in $HOSTS; do
            echo "▶ NATS creds: $HOST..."

            # Обновляем /etc/nats/nats.conf — authorization блок.
            # NATS использует env-переменные ($NATS_CLUSTER_USER, $NATS_CLUSTER_PASSWORD)
            # из /etc/nats/env, которые раскрываются при старте.
            # Обновляем env-файл — в нём хранятся реальные значения.
            SCRIPT="
            set -e
            ENV_FILE=/etc/nats/env

            if grep -q '^NATS_CLUSTER_USER=' \"\$ENV_FILE\"; then
              sed -i \"s|^NATS_CLUSTER_USER=.*|NATS_CLUSTER_USER=$(printf '%q' "$PLATFORM_NATS_USER")|\" \"\$ENV_FILE\"
            else
              echo \"NATS_CLUSTER_USER=$(printf '%q' "$PLATFORM_NATS_USER")\" >> \"\$ENV_FILE\"
            fi

            if grep -q '^NATS_CLUSTER_PASSWORD=' \"\$ENV_FILE\"; then
              sed -i \"s|^NATS_CLUSTER_PASSWORD=.*|NATS_CLUSTER_PASSWORD=$(printf '%q' "$PLATFORM_NATS_PASSWORD")|\" \"\$ENV_FILE\"
            else
              echo \"NATS_CLUSTER_PASSWORD=$(printf '%q' "$PLATFORM_NATS_PASSWORD")\" >> \"\$ENV_FILE\"
            fi

            chmod 600 \"\$ENV_FILE\"
            systemctl reload nats
            echo \"  ✓ NATS creds обновлены, reload выполнен\"
            "

            $SSH "${PLATFORM_DEPLOY_USER}@${HOST}" "sudo bash -s" <<< "$SCRIPT"
          done

      - name: Rotate NATS TLS
        if: inputs.rotate_nats_tls == true
        run: |
          KEY_FILE=$(cat /tmp/rotate_key_file)
          KNOWN_HOSTS_FILE=$(cat /tmp/rotate_known_hosts)
          HOSTS=$(cat /tmp/rotate_hosts)

          SSH="ssh -i $KEY_FILE -o UserKnownHostsFile=$KNOWN_HOSTS_FILE -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=10"
          SCP="scp -i $KEY_FILE -o UserKnownHostsFile=$KNOWN_HOSTS_FILE -o StrictHostKeyChecking=yes -o BatchMode=yes"

          # Валидация CA cert
          CA_CERT_TMP=$(mktemp)
          printf '%s\n' "$PLATFORM_NATS_CA_CERT" > "$CA_CERT_TMP"
          openssl x509 -noout -in "$CA_CERT_TMP" 2>/dev/null \
            || { echo "FAIL: PLATFORM_NATS_CA_CERT невалиден"; exit 1; }

          for HOST in $HOSTS; do
            echo "▶ NATS TLS: $HOST..."

            # Генерируем node cert на runner, чтобы CA-ключ не попадал на сервер.
            NODE_KEY=$(mktemp)
            NODE_CSR=$(mktemp)
            NODE_CERT=$(mktemp)
            SAN_CNF=$(mktemp)

            openssl ecparam -name prime256v1 -genkey -noout -out "$NODE_KEY" 2>/dev/null
            openssl req -new -key "$NODE_KEY" -out "$NODE_CSR" \
              -subj "/CN=nats-${HOST}/O=platform" 2>/dev/null

            printf 'subjectAltName=DNS:%s,IP:127.0.0.1\n' "$PLATFORM_DOMAIN" > "$SAN_CNF"

            CA_KEY_TMP=$(mktemp)
            chmod 600 "$CA_KEY_TMP"
            printf '%s\n' "$PLATFORM_NATS_CA_KEY" > "$CA_KEY_TMP"

            openssl x509 -req \
              -in "$NODE_CSR" \
              -CA "$CA_CERT_TMP" \
              -CAkey "$CA_KEY_TMP" \
              -CAcreateserial \
              -out "$NODE_CERT" \
              -days 3650 \
              -extfile "$SAN_CNF" 2>/dev/null

            rm -f "$CA_KEY_TMP" "$NODE_CSR" "$SAN_CNF"

            # Копируем на сервер
            $SCP "$CA_CERT_TMP" "${PLATFORM_DEPLOY_USER}@${HOST}:/tmp/nats-ca.crt"
            $SCP "$NODE_CERT" "${PLATFORM_DEPLOY_USER}@${HOST}:/tmp/nats-node.crt"
            $SCP "$NODE_KEY" "${PLATFORM_DEPLOY_USER}@${HOST}:/tmp/nats-node.key"

            rm -f "$NODE_KEY" "$NODE_CERT"

            INSTALL_SCRIPT='
            set -e
            mv /tmp/nats-ca.crt /etc/nats/ca.crt
            mv /tmp/nats-node.crt /etc/nats/node.crt
            mv /tmp/nats-node.key /etc/nats/node.key
            chmod 644 /etc/nats/ca.crt /etc/nats/node.crt
            chmod 600 /etc/nats/node.key
            chown nats:nats /etc/nats/ca.crt /etc/nats/node.crt /etc/nats/node.key
            systemctl restart nats
            echo "  ✓ NATS TLS обновлён, restart выполнен"
            '

            $SSH "${PLATFORM_DEPLOY_USER}@${HOST}" "sudo bash" <<< "$INSTALL_SCRIPT"
          done

          rm -f "$CA_CERT_TMP"

      - name: Rotate Nomad TLS
        if: inputs.rotate_nomad_tls == true
        run: |
          KEY_FILE=$(cat /tmp/rotate_key_file)
          KNOWN_HOSTS_FILE=$(cat /tmp/rotate_known_hosts)
          HOSTS=$(cat /tmp/rotate_hosts)

          SSH="ssh -i $KEY_FILE -o UserKnownHostsFile=$KNOWN_HOSTS_FILE -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=10"
          SCP="scp -i $KEY_FILE -o UserKnownHostsFile=$KNOWN_HOSTS_FILE -o StrictHostKeyChecking=yes -o BatchMode=yes"

          CA_CERT_TMP=$(mktemp)
          printf '%s\n' "$PLATFORM_NOMAD_CA_CERT" > "$CA_CERT_TMP"
          openssl x509 -noout -in "$CA_CERT_TMP" 2>/dev/null \
            || { echo "FAIL: PLATFORM_NOMAD_CA_CERT невалиден"; exit 1; }

          SAN_CNF=$(mktemp)
          printf 'subjectAltName=DNS:server.global.nomad,DNS:client.global.nomad,IP:127.0.0.1\n' > "$SAN_CNF"

          for HOST in $HOSTS; do
            echo "▶ Nomad TLS: $HOST..."

            NODE_KEY=$(mktemp)
            NODE_CSR=$(mktemp)
            NODE_CERT=$(mktemp)

            openssl ecparam -name prime256v1 -genkey -noout -out "$NODE_KEY" 2>/dev/null
            openssl req -new -key "$NODE_KEY" -out "$NODE_CSR" \
              -subj "/CN=server.global.nomad/O=platform" 2>/dev/null

            CA_KEY_TMP=$(mktemp)
            chmod 600 "$CA_KEY_TMP"
            printf '%s\n' "$PLATFORM_NOMAD_CA_KEY" > "$CA_KEY_TMP"

            openssl x509 -req \
              -in "$NODE_CSR" \
              -CA "$CA_CERT_TMP" \
              -CAkey "$CA_KEY_TMP" \
              -CAcreateserial \
              -out "$NODE_CERT" \
              -days 3650 \
              -extfile "$SAN_CNF" 2>/dev/null

            rm -f "$CA_KEY_TMP" "$NODE_CSR"

            $SCP "$CA_CERT_TMP" "${PLATFORM_DEPLOY_USER}@${HOST}:/tmp/nomad-ca.crt"
            $SCP "$NODE_CERT" "${PLATFORM_DEPLOY_USER}@${HOST}:/tmp/nomad-node.crt"
            $SCP "$NODE_KEY" "${PLATFORM_DEPLOY_USER}@${HOST}:/tmp/nomad-node.key"

            rm -f "$NODE_KEY" "$NODE_CERT"

            INSTALL_SCRIPT='
            set -e
            mv /tmp/nomad-ca.crt /etc/nomad/ca.crt
            mv /tmp/nomad-node.crt /etc/nomad/node.crt
            mv /tmp/nomad-node.key /etc/nomad/node.key
            chmod 644 /etc/nomad/ca.crt /etc/nomad/node.crt
            chmod 600 /etc/nomad/node.key
            chown nomad:nomad /etc/nomad/ca.crt /etc/nomad/node.crt /etc/nomad/node.key
            systemctl restart nomad
            echo "  ✓ Nomad TLS обновлён, restart выполнен"
            '

            $SSH "${PLATFORM_DEPLOY_USER}@${HOST}" "sudo bash" <<< "$INSTALL_SCRIPT"
          done

          rm -f "$CA_CERT_TMP" "$SAN_CNF"

      - name: Rotate Nomad gossip key
        if: inputs.rotate_nomad_gossip == true
        run: |
          KEY_FILE=$(cat /tmp/rotate_key_file)
          KNOWN_HOSTS_FILE=$(cat /tmp/rotate_known_hosts)
          HOSTS=$(cat /tmp/rotate_hosts)

          SSH="ssh -i $KEY_FILE -o UserKnownHostsFile=$KNOWN_HOSTS_FILE -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=10"

          for HOST in $HOSTS; do
            echo "▶ Nomad gossip: $HOST..."

            SCRIPT="
            set -e
            ENV_FILE=/etc/nomad/env

            if grep -q '^PLATFORM_NOMAD_GOSSIP_KEY=' \"\$ENV_FILE\"; then
              sed -i \"s|^PLATFORM_NOMAD_GOSSIP_KEY=.*|PLATFORM_NOMAD_GOSSIP_KEY=$(printf '%q' "$PLATFORM_NOMAD_GOSSIP_KEY")|\" \"\$ENV_FILE\"
            else
              echo \"PLATFORM_NOMAD_GOSSIP_KEY=$(printf '%q' "$PLATFORM_NOMAD_GOSSIP_KEY")\" >> \"\$ENV_FILE\"
            fi

            chmod 600 \"\$ENV_FILE\"
            systemctl restart nomad
            echo \"  ✓ Nomad gossip key обновлён, restart выполнен\"
            "

            $SSH "${PLATFORM_DEPLOY_USER}@${HOST}" "sudo bash -s" <<< "$SCRIPT"
          done

      - name: Cleanup SSH keys
        if: always()
        run: |
          rm -f "$(cat /tmp/rotate_key_file 2>/dev/null)" \
                "$(cat /tmp/rotate_known_hosts 2>/dev/null)" \
                /tmp/rotate_key_file /tmp/rotate_known_hosts /tmp/rotate_hosts

      - name: Wait for services to stabilize
        run: |
          echo "Ожидание стабилизации сервисов (15s)..."
          sleep 15

  # ===========================================================================
  # Редеплой — обновляем Nomad-джобы, чтобы сервисы получили новые секреты.
  # Запускается только при ротации NATS creds (единственный случай, когда
  # серверный конфиг и Nomad job env должны совпадать).
  # TLS/gossip не требуют редеплоя — сервисы не работают с этими секретами.
  # ===========================================================================
  redeploy:
    name: Redeploy services
    needs: rotate
    if: inputs.rotate_nats_creds == true
    runs-on: ubuntu-latest

    env:
      PLATFORM_DEPLOY_SSH_KEY:           ${{ secrets.PLATFORM_DEPLOY_SSH_KEY }}
      PLATFORM_DEPLOY_USER:              ${{ vars.PLATFORM_DEPLOY_USER }}
      PLATFORM_DOMAIN:                   ${{ vars.PLATFORM_DOMAIN }}
      PLATFORM_NOMAD_TOKEN:              ${{ secrets.PLATFORM_NOMAD_TOKEN }}
      PLATFORM_HOST_FINGERPRINTS:        ${{ vars.PLATFORM_HOST_FINGERPRINTS }}
      PLATFORM_NATS_USER:                ${{ vars.PLATFORM_NATS_USER }}
      PLATFORM_NATS_PASSWORD:            ${{ secrets.PLATFORM_NATS_PASSWORD }}
      PLATFORM_ALLOWED_HOSTS:            ${{ vars.PLATFORM_ALLOWED_HOSTS }}
      PLATFORM_GATEWAY_AUTH_RATE_PREFIX: ${{ vars.PLATFORM_GATEWAY_AUTH_RATE_PREFIX }}
      PLATFORM_GATEWAY_TRUSTED_PROXY:    ${{ vars.PLATFORM_GATEWAY_TRUSTED_PROXY }}
      X_AUTH_USERNAME:                   ${{ vars.X_AUTH_USERNAME }}
      X_AUTH_PASSWORD:                   ${{ secrets.X_AUTH_PASSWORD }}
      X_AUTH_ACCESS_SECRET:              ${{ secrets.X_AUTH_ACCESS_SECRET }}
      X_AUTH_REFRESH_SECRET:             ${{ secrets.X_AUTH_REFRESH_SECRET }}
      X_AUTH_COOKIE_DOMAIN:              ${{ vars.X_AUTH_COOKIE_DOMAIN }}
      X_AUTH_COOKIE_SECURE:              ${{ vars.X_AUTH_COOKIE_SECURE || 'true' }}
      X_AUTH_COOKIE_SAMESITE:            ${{ vars.X_AUTH_COOKIE_SAMESITE || 'strict' }}
      X_AUTH_ACCESS_TTL:                 ${{ vars.X_AUTH_ACCESS_TTL || '15m' }}
      X_AUTH_REFRESH_TTL:                ${{ vars.X_AUTH_REFRESH_TTL || '168h' }}
      X_HTTP_DATABASE_URL:               ${{ secrets.X_HTTP_DATABASE_URL }}
      X_HTTP_CACHE_TTL:                  ${{ vars.X_HTTP_CACHE_TTL || '30s' }}
      X_WS_INACTIVITY_TIMEOUT:           ${{ vars.X_WS_INACTIVITY_TIMEOUT || '3m' }}

    steps:
      - uses: actions/checkout@v5

      - name: Get latest release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Последний pre-release build-N — это то, что сейчас задеплоено.
          RELEASE=$(gh release list --repo "${{ github.repository }}" --limit 20 \
            --json tagName,isPrerelease \
            | jq -r '[.[] | select(.isPrerelease and (.tagName | startswith("build-")))] | sort_by(.tagName | ltrimstr("build-") | tonumber) | last | .tagName')

          [ -n "$RELEASE" ] && [ "$RELEASE" != "null" ] \
            || { echo "Не найден ни один pre-release build-N"; exit 1; }

          echo "version=$RELEASE" >> "$GITHUB_OUTPUT"
          echo "▶ Редеплой версии: $RELEASE"

      - name: Download checksums from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.release.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --pattern "checksums.env" \
            --dir .

      - name: Load checksums into env
        run: cat checksums.env >> "$GITHUB_ENV"

      - name: Redeploy gateway
        uses: ./.github/actions/deploy-nomad
        with:
          nomad_file: gateway.nomad
          version: ${{ steps.release.outputs.version }}

      - name: Redeploy xauth
        uses: ./.github/actions/deploy-nomad
        with:
          nomad_file: xauth.nomad
          version: ${{ steps.release.outputs.version }}

      - name: Redeploy xhttp
        uses: ./.github/actions/deploy-nomad
        with:
          nomad_file: xhttp.nomad
          version: ${{ steps.release.outputs.version }}

      - name: Redeploy xws
        uses: ./.github/actions/deploy-nomad
        with:
          nomad_file: xws.nomad
          version: ${{ steps.release.outputs.version }}

