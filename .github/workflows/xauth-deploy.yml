# .github/workflows/xauth-deploy.yml
#
# Деплой xauth. Запускается после успешного CI.
#
# GitHub Secrets (платформа):
#   PLATFORM_DEPLOY_SSH_KEY, PLATFORM_NOMAD_TOKEN
#   PLATFORM_NATS_PASSWORD
# GitHub Secrets (X-сервисы):
#   X_AUTH_PASSWORD          — пароль для xauth
#   X_AUTH_ACCESS_SECRET     — HMAC-ключ access JWT  (openssl rand -hex 32)
#   X_AUTH_REFRESH_SECRET    — HMAC-ключ refresh JWT (openssl rand -hex 32)
# GitHub Variables (платформа):
#   PLATFORM_DOMAIN          — DNS домен кластера
#   PLATFORM_DEPLOY_USER     — SSH-пользователь
#   PLATFORM_NATS_USER       — логин NATS-сервера
#   PLATFORM_HOST_FINGERPRINTS — SHA256 host keys прод-нод
# GitHub Variables (X-сервисы):
#   X_AUTH_USERNAME          — имя пользователя для xauth
#   X_AUTH_COOKIE_DOMAIN     — домен для Set-Cookie (например: .example.com)
#   X_AUTH_COOKIE_SECURE     — по умолчанию true
#   X_AUTH_COOKIE_SAMESITE   — по умолчанию strict (strict|lax|none)
#   X_AUTH_ACCESS_TTL        — по умолчанию 15m
#   X_AUTH_REFRESH_TTL       — по умолчанию 168h

name: Deploy xauth

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      PLATFORM_DEPLOY_SSH_KEY:  ${{ secrets.PLATFORM_DEPLOY_SSH_KEY }}
      PLATFORM_DEPLOY_USER:     ${{ vars.PLATFORM_DEPLOY_USER }}
      PLATFORM_DOMAIN:          ${{ vars.PLATFORM_DOMAIN }}
      PLATFORM_NOMAD_TOKEN:     ${{ secrets.PLATFORM_NOMAD_TOKEN }}
      PLATFORM_HOST_FINGERPRINTS: ${{ vars.PLATFORM_HOST_FINGERPRINTS }}
      PLATFORM_NATS_USER:       ${{ vars.PLATFORM_NATS_USER }}
      PLATFORM_NATS_PASSWORD:   ${{ secrets.PLATFORM_NATS_PASSWORD }}
      X_AUTH_USERNAME:          ${{ vars.X_AUTH_USERNAME }}
      X_AUTH_PASSWORD:          ${{ secrets.X_AUTH_PASSWORD }}
      X_AUTH_ACCESS_SECRET:     ${{ secrets.X_AUTH_ACCESS_SECRET }}
      X_AUTH_REFRESH_SECRET:    ${{ secrets.X_AUTH_REFRESH_SECRET }}
      X_AUTH_COOKIE_DOMAIN:     ${{ vars.X_AUTH_COOKIE_DOMAIN || '' }}
      X_AUTH_COOKIE_SECURE:     ${{ vars.X_AUTH_COOKIE_SECURE || 'true' }}
      X_AUTH_COOKIE_SAMESITE:   ${{ vars.X_AUTH_COOKIE_SAMESITE || 'strict' }}
      X_AUTH_ACCESS_TTL:        ${{ vars.X_AUTH_ACCESS_TTL || '15m' }}
      X_AUTH_REFRESH_TTL:       ${{ vars.X_AUTH_REFRESH_TTL || '168h' }}

    steps:
      - uses: actions/checkout@v5

      - name: Download checksums
        uses: actions/download-artifact@v8
        with:
          name: checksums
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load checksums into env
        run: cat checksums.env >> "$GITHUB_ENV"

      - uses: ./.github/actions/deploy-nomad
        with:
          nomad_file: xauth.nomad
          version: build-${{ github.event.workflow_run.run_number }}
