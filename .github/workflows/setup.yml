# .github/workflows/setup.yml
#
# Подготовка новой VPS через GitHub Actions.
# Альтернатива ручному запуску setup.sh — все секреты из GitHub Secrets.
#
# Предпочтительный способ: запустить setup.sh прямо на сервере (полный список
# обязательных переменных — в шапке самого setup.sh).
#
# GitHub Secrets и Variables, необходимые для этого workflow:
#   PLATFORM_DEPLOY_SSH_KEY   — [Secret] приватный Ed25519-ключ
#   PLATFORM_DEPLOY_USER      — [Variable] SSH-пользователь (например: ubuntu)
#   PLATFORM_NATS_USER        — [Variable] логин NATS-сервера
#   PLATFORM_NATS_PASSWORD    — [Secret] пароль NATS-сервера
#   PLATFORM_NATS_CA_KEY      — приватный ключ CA NATS  (PEM, генерируется один раз локально)
#   PLATFORM_NATS_CA_CERT     — сертификат CA NATS      (PEM)
#   PLATFORM_NOMAD_CA_KEY     — приватный ключ CA Nomad (PEM, генерируется один раз локально)
#   PLATFORM_NOMAD_CA_CERT    — сертификат CA Nomad     (PEM)
#   PLATFORM_NOMAD_GOSSIP_KEY — 32-байтный gossip-key Nomad в base64 (openssl rand -base64 32)
#   PLATFORM_NOMAD_TOKEN      — UUID, используется как bootstrap-секрет Nomad ACL (uuidgen)

name: Setup VPS

on:
  workflow_dispatch:
    inputs:
      node_ip:
        description: 'IP новой ноды (публичный, для SSH)'
        required: true
      platform_domain:
        description: 'Домен A-записей кластера (например: nodes.example.com)'
        required: true
      host_fingerprint:
        description: 'SSH host fingerprint новой ноды в формате SHA256:abc123... Получить из консоли/системного лога провайдера. Пусто — TOFU без MITM-защиты (см. лог workflow).'
        required: false
        default: ''

jobs:
  setup:
    name: Setup ${{ inputs.node_ip }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Configure SSH
        env:
          PLATFORM_DEPLOY_SSH_KEY: ${{ secrets.PLATFORM_DEPLOY_SSH_KEY }}
          NODE_IP: ${{ inputs.node_ip }}
          HOST_FINGERPRINT: ${{ inputs.host_fingerprint }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$PLATFORM_DEPLOY_SSH_KEY" > ~/.ssh/setup_key
          chmod 600 ~/.ssh/setup_key

          # Получаем host keys целевой ноды через ssh-keyscan и помещаем в known_hosts.
          # Если HOST_FINGERPRINT задан — верифицируем (защита от MITM первого
          # подключения, утечка PLATFORM_NATS_CA_KEY/PLATFORM_NOMAD_CA_KEY/PLATFORM_NOMAD_GOSSIP_KEY/PLATFORM_NOMAD_TOKEN
          # на чужой эндпоинт исключена).
          # Если пуст — TOFU: первый ключ принимаем, fingerprint выводится в лог
          # для последующей сверки оператором.
          ssh-keyscan -t ed25519,ecdsa,rsa "$NODE_IP" > /tmp/host_keys 2>/dev/null
          [ -s /tmp/host_keys ] || { echo "ssh-keyscan: пустой ответ от $NODE_IP"; exit 1; }

          echo "Host key fingerprint(s) для $NODE_IP:"
          ssh-keygen -lf /tmp/host_keys

          if [ -n "$HOST_FINGERPRINT" ]; then
            if ! ssh-keygen -lf /tmp/host_keys | awk '{print $2}' | grep -qFx "$HOST_FINGERPRINT"; then
              echo "FAIL: ни один host key не совпал с ожидаемым fingerprint $HOST_FINGERPRINT"
              exit 1
            fi
            echo "OK: host fingerprint подтверждён"
          else
            echo "WARN: host_fingerprint не задан — TOFU режим, MITM первого подключения не отслеживается."
            echo "      Сверьте fingerprint выше с консолью провайдера; при следующих запусках задавайте host_fingerprint."
          fi

          cat /tmp/host_keys >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # Формируем env-файл с секретами. GitHub маскирует значения в логах.
      # Все user-controlled inputs идут через env-секцию, а не прямую
      # ${{ }}-интерполяцию в bash — закрывает script injection (heredoc <<EOF
      # без кавычек выполняет $() из подставленного значения).
      - name: Write setup env
        env:
          PLATFORM_NATS_USER: ${{ vars.PLATFORM_NATS_USER }}
          PLATFORM_NATS_PASSWORD: ${{ secrets.PLATFORM_NATS_PASSWORD }}
          PLATFORM_NATS_CA_KEY: ${{ secrets.PLATFORM_NATS_CA_KEY }}
          PLATFORM_NATS_CA_CERT: ${{ secrets.PLATFORM_NATS_CA_CERT }}
          PLATFORM_NOMAD_CA_KEY: ${{ secrets.PLATFORM_NOMAD_CA_KEY }}
          PLATFORM_NOMAD_CA_CERT: ${{ secrets.PLATFORM_NOMAD_CA_CERT }}
          PLATFORM_NOMAD_GOSSIP_KEY: ${{ secrets.PLATFORM_NOMAD_GOSSIP_KEY }}
          PLATFORM_NOMAD_TOKEN: ${{ secrets.PLATFORM_NOMAD_TOKEN }}
          PLATFORM_DOMAIN: ${{ inputs.platform_domain }}
          NODE_IP: ${{ inputs.node_ip }}
          REPO_URL: https://github.com/${{ github.repository }}.git
        run: |
          cat > /tmp/setup_env << EOF
          NODE_IP="${NODE_IP}"
          PLATFORM_DOMAIN="${PLATFORM_DOMAIN}"
          PLATFORM_NATS_USER="${PLATFORM_NATS_USER}"
          PLATFORM_NATS_PASSWORD="${PLATFORM_NATS_PASSWORD}"
          PLATFORM_NATS_CA_KEY="${PLATFORM_NATS_CA_KEY}"
          PLATFORM_NATS_CA_CERT="${PLATFORM_NATS_CA_CERT}"
          PLATFORM_NOMAD_CA_KEY="${PLATFORM_NOMAD_CA_KEY}"
          PLATFORM_NOMAD_CA_CERT="${PLATFORM_NOMAD_CA_CERT}"
          PLATFORM_NOMAD_GOSSIP_KEY="${PLATFORM_NOMAD_GOSSIP_KEY}"
          PLATFORM_NOMAD_TOKEN="${PLATFORM_NOMAD_TOKEN}"
          REPO_URL="${REPO_URL}"
          EOF
          chmod 600 /tmp/setup_env

      - name: Copy setup files
        env:
          PLATFORM_DEPLOY_USER: ${{ vars.PLATFORM_DEPLOY_USER }}
          NODE_IP: ${{ inputs.node_ip }}
        run: |
          # StrictHostKeyChecking=yes — host keys уже в known_hosts (см. Configure SSH);
          # неизвестный/изменённый ключ → отказ (вместо «принять любой»).
          SCP="scp -i ~/.ssh/setup_key -o StrictHostKeyChecking=yes"
          $SCP /tmp/setup_env \
            deployments/envs/prod/setup.sh \
            "${PLATFORM_DEPLOY_USER}@${NODE_IP}:/tmp/"

      - name: Run setup.sh
        env:
          PLATFORM_DEPLOY_USER: ${{ vars.PLATFORM_DEPLOY_USER }}
          NODE_IP: ${{ inputs.node_ip }}
        run: |
          SSH="ssh -i ~/.ssh/setup_key -o StrictHostKeyChecking=yes -o BatchMode=yes"
          $SSH "${PLATFORM_DEPLOY_USER}@${NODE_IP}" "sudo bash -c 'set -a; . /tmp/setup_env; set +a; bash /tmp/setup.sh'"
          # Удаление файлов тоже под sudo, на случай если env-файл стал принадлежать руту
          $SSH "${PLATFORM_DEPLOY_USER}@${NODE_IP}" "sudo rm -f /tmp/setup_env /tmp/setup.sh"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/setup_key /tmp/setup_env /tmp/host_keys
