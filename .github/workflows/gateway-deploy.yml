# .github/workflows/gateway-deploy.yml
#
# Деплой Gateway. Запускается после успешного CI.
#
# GitHub Secrets (платформа):
#   PLATFORM_DEPLOY_SSH_KEY       — SSH-ключ для деплоя
#   PLATFORM_NATS_PASSWORD
#   PLATFORM_NOMAD_TOKEN
# GitHub Variables (платформа):
#   PLATFORM_NATS_USER
#   PLATFORM_DOMAIN               — DNS домен кластера
#   PLATFORM_DEPLOY_USER          — SSH-пользователь
#   PLATFORM_HOST_FINGERPRINTS    — SHA256 host keys прод-нод
#   PLATFORM_ALLOWED_HOSTS        — разрешённые HTTP Origin
#   PLATFORM_GATEWAY_AUTH_RATE_PREFIX   — URL-префикс жёсткого rate limit
#   PLATFORM_GATEWAY_TRUSTED_PROXY      — IP доверенного прокси/LB

name: Deploy gateway

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      PLATFORM_DEPLOY_SSH_KEY:           ${{ secrets.PLATFORM_DEPLOY_SSH_KEY }}
      PLATFORM_DEPLOY_USER:              ${{ vars.PLATFORM_DEPLOY_USER }}
      PLATFORM_DOMAIN:                   ${{ vars.PLATFORM_DOMAIN }}
      PLATFORM_NOMAD_TOKEN:              ${{ secrets.PLATFORM_NOMAD_TOKEN }}
      PLATFORM_HOST_FINGERPRINTS:        ${{ vars.PLATFORM_HOST_FINGERPRINTS }}
      PLATFORM_NATS_USER:                ${{ vars.PLATFORM_NATS_USER }}
      PLATFORM_NATS_PASSWORD:            ${{ secrets.PLATFORM_NATS_PASSWORD }}
      PLATFORM_ALLOWED_HOSTS:            ${{ vars.PLATFORM_ALLOWED_HOSTS }}
      PLATFORM_GATEWAY_AUTH_RATE_PREFIX: ${{ vars.PLATFORM_GATEWAY_AUTH_RATE_PREFIX }}
      PLATFORM_GATEWAY_TRUSTED_PROXY:    ${{ vars.PLATFORM_GATEWAY_TRUSTED_PROXY }}

    steps:
      - uses: actions/checkout@v6

      - name: Download checksums
        uses: actions/download-artifact@v8
        with:
          name: checksums
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load checksums into env
        run: cat checksums.env >> "$GITHUB_ENV"

      - uses: ./.github/actions/deploy-nomad
        with:
          nomad_file: gateway.nomad
          version: build-${{ github.event.workflow_run.run_number }}
