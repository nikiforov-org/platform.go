# .github/workflows/xws-deploy.yml
#
# Деплой xws. Запускается после успешного CI.
#
# GitHub Secrets (платформа):
#   PLATFORM_DEPLOY_SSH_KEY, PLATFORM_NOMAD_TOKEN
#   PLATFORM_NATS_PASSWORD
# GitHub Variables (платформа):
#   PLATFORM_DOMAIN          — DNS домен кластера
#   PLATFORM_DEPLOY_USER     — SSH-пользователь
#   PLATFORM_NATS_USER       — логин NATS-сервера
#   PLATFORM_HOST_FINGERPRINTS — SHA256 host keys прод-нод
# GitHub Variables (X-сервисы):
#   X_WS_INACTIVITY_TIMEOUT  — по умолчанию 3m

name: Deploy xws

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    env:
      PLATFORM_DEPLOY_SSH_KEY:  ${{ secrets.PLATFORM_DEPLOY_SSH_KEY }}
      PLATFORM_DEPLOY_USER:     ${{ vars.PLATFORM_DEPLOY_USER }}
      PLATFORM_DOMAIN:          ${{ vars.PLATFORM_DOMAIN }}
      PLATFORM_NOMAD_TOKEN:     ${{ secrets.PLATFORM_NOMAD_TOKEN }}
      PLATFORM_HOST_FINGERPRINTS: ${{ vars.PLATFORM_HOST_FINGERPRINTS }}
      PLATFORM_NATS_USER:       ${{ vars.PLATFORM_NATS_USER }}
      PLATFORM_NATS_PASSWORD:   ${{ secrets.PLATFORM_NATS_PASSWORD }}
      X_WS_INACTIVITY_TIMEOUT:  ${{ vars.X_WS_INACTIVITY_TIMEOUT || '3m' }}

    steps:
      - uses: actions/checkout@v5

      - name: Download checksums
        uses: actions/download-artifact@v5
        with:
          name: checksums
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load checksums into env
        run: cat checksums.env >> "$GITHUB_ENV"

      - uses: ./.github/actions/deploy-nomad
        with:
          nomad_file: xws.nomad
          version: build-${{ github.event.workflow_run.run_number }}
