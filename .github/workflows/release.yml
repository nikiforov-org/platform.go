name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          # cmd/*/ с nullglob — раскрывается только в директории; файл в cmd/
          # (README, .gitkeep, .DS_Store) не попадает в цикл и не ломает go build.
          # Идентично ci.yml — синхронизировано в I-L4-regression (2026-04-25).
          shopt -s nullglob
          for dir in cmd/*/; do
            svc="${dir%/}"; svc="${svc#cmd/}"
            for arch in amd64 arm64; do
              GOOS=linux GOARCH=$arch CGO_ENABLED=0 \
                go build -trimpath -o dist/$svc ./cmd/$svc
              chmod +x dist/$svc
              tar -czf dist/${svc}_linux_${arch}.tar.gz -C dist $svc
              rm dist/$svc
            done
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
